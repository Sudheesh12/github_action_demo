name: My First CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install dependencies
        run: pip install -r requirement.txt

      - name: build docker image
        run: docker build -t my-app .

      - name: login to dockerhub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: tag the docker image
        run: docker tag my-app "${{ secrets.DOCKER_USERNAME }}"/github-actions-demo:latest
        
      - name: push the docker image
        run: docker push "${{ secrets.DOCKER_USERNAME }}"/github-actions-demo:latest

      - name: deploy the image in the SSH host
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          post: 22
          script: |
            docker pull "${{ secrets.DOCKER_USERNAME }}"/github-actions-demo:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 80:80 my-app "${{ secrets.DOCKER_USERNAME }}"/github-actions-demo:latest
       

      
  
